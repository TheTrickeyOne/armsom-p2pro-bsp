name: Build BPI-P2 Pro Debian Image

on:
  workflow_dispatch: # Allows manual trigger via the GitHub UI button

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # Ensures any linked rootfs submodules are cleanly pulled

    - name: Install Standard Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential gcc-aarch64-linux-gnu \
        device-tree-compiler lz4 libncurses5-dev libssl-dev bc flex bison \
        binfmt-support qemu-user-static debootstrap dosfstools mtools parted \
        rsync u-boot-tools python3 python3-pip expect time

    - name: Install Proprietary Rockchip Live-Build Patches
      run: |
        # Override standard Ubuntu packages with the legacy, custom-patched 
        # live-build utilities bundled natively inside the SDK repository.
        if [ -d "debian/ubuntu-build-service/packages" ]; then
          cd debian/ubuntu-build-service/packages/
          sudo dpkg -i *.deb || true
          sudo apt-get install -f -y
        elif [ -d "rootfs/ubuntu-build-service/packages" ]; then
          cd rootfs/ubuntu-build-service/packages/
          sudo dpkg -i *.deb || true
          sudo apt-get install -f -y
        fi

    - name: Swap Out Hardcoded Chinese Mirrors
      run: |
        # Find all references to the Chinese USTC mirror and replace them with global mirrors.
        find . -type f -exec sed -i 's/mirrors.ustc.edu.cn\/debian-security/security.debian.org\/debian-security/g' {} +
        find . -type f -exec sed -i 's/mirrors.ustc.edu.cn/deb.debian.org/g' {} +

    - name: Compile Official Debian Image
      run: |
        # Set target environment to Debian matching the developer manual
        export RK_ROOTFS_SYSTEM=debian
        
        chmod +x build.sh
        
        # Select option 3 (BoardConfig_rk3308_bpi-p2_pro.mk) non-interactively
        echo "3" | ./build.sh

    - name: Compress and Package Image
      run: |
        # Navigate to the compiled build output and archive the flashable image
        cd output/
        tar -czvf bpi-p2-pro-debian.tar.gz *.img || tar -czvf bpi-p2-pro-debian.tar.gz *

    - name: Upload Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bpi-p2-pro-debian-image
        path: output/bpi-p2-pro-debian.tar.gz
        retention-days: 5
