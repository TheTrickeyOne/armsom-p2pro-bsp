name: Build BPI-P2 Pro Debian Image

on:
  workflow_dispatch: # Allows you to manually trigger the build via a button

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential gcc-aarch64-linux-gnu \
        device-tree-compiler lz4 libncurses5-dev libssl-dev bc flex bison \
        binfmt-support qemu-user-static debootstrap dosfstools mtools parted \
        rsync u-boot-tools python3 python3-pip

        - name: Compile Debian Image
          run: |
            # Force the BSP framework to build a Debian Rootfs instead of Buildroot
            export RK_ROOTFS_SYSTEM=debian
        
            chmod +x build.sh
        
            # Method 1: Pre-select the board config by setting the environment variable
            # This tells the script exactly which board config to use without asking
            ./build.sh BoardConfig_rk3308_bpi-p2_pro.mk
        
            # Run the full build
            ./build.sh

    - name: Compress and Package Image
      run: |
        # Look for the output directory (usually 'output' or 'rockdev')
        # We compress it to save space and speed up your download
        cd output/
        tar -czvf bpi-p2-pro-debian.tar.gz *.img || tar -czvf bpi-p2-pro-debian.tar.gz *

    - name: Upload Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bpi-p2-pro-debian-image
        path: output/bpi-p2-pro-debian.tar.gz
        retention-days: 5
